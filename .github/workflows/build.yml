name: Weekly Build

on:
  schedule:
    - cron: "30 22 * * 1"
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and Publish Package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          pip install -r requirements.txt

      - name: Auto-Update Version
        run: |
          sed -i "s/version = \".*\"/version = \"1.0.${{ github.run_number }}\"/" pyproject.toml

      - name: Build Package
        run: python -m build

      - name: Publish to GitHub Packages
        env:
          TWINE_USERNAME: ${{ github.actor }}
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          TWINE_REPOSITORY_URL: https://pypi.pkg.github.com/${{ github.repository_owner }}/${{ github.event.repository.name }}
        run: |
          # We remove --skip-existing because GitHub doesn't support it, 
          # but our unique versioning above fixes the conflict issue.
          python -m twine upload --repository-url $TWINE_REPOSITORY_URL dist/*

      - name: Sync Changes
        # This pushes the updated pyproject.toml and data.json back to your repo
        if: github.event_name != 'pull_request'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json pyproject.toml
          git commit -m "Automated build v1.0.${{ github.run_number }}" || echo "No changes to commit"
          git push
