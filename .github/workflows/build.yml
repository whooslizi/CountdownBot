name: Weekly Build

on:
  schedule:
    - cron: "30 22 * * 1" # Runs daily at 22:30
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          pip install -r requirements.txt

      - name: Auto-Update Version
        # This ensures every build has a unique version (e.g., 0.1.7, 0.1.8)
        run: |
          sed -i "s/version = \".*\"/version = \"0.1.${{ github.run_number }}\"/" pyproject.toml

      - name: Build Package
        run: python -m build

      - name: Publish to GitHub Packages
        shell: bash
        env:
          TWINE_USERNAME: ${{ github.actor }}
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The fix for 404: Force lowercase on the owner and repo name
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_LC=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          
          # Uploading to the specific repository registry
          python -m twine upload \
            --repository-url "https://pypi.pkg.github.com/${OWNER_LC}/${REPO_LC}/" \
            dist/*

      - name: Sync Changes
        if: github.event_name != 'pull_request'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json pyproject.toml
          git commit -m "Automated build v0.1.${{ github.run_number }}" || echo "No changes to commit"
          git push
