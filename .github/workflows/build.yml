name: Weekly Build

on:
  schedule:
    - cron: '0 3 * * 1' # 3 AM every Monday
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          pip install -r requirements.txt

      - name: Auto-Update Version
        run: |
          # This replaces the version in pyproject.toml with a unique one for this run
          # Example: 1.0.1, 1.0.2, etc.
          sed -i "s/version = \".*\"/version = \"1.0.${{ github.run_number }}\"/" pyproject.toml

      - name: Build Package
        run: python -m build

      - name: Publish to GitHub Packages
        env:
          TWINE_USERNAME: ${{ github.actor }}
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          TWINE_REPOSITORY_URL: https://pypi.pkg.github.com/${{ github.repository_owner }}/${{ github.event.repository.name }}
        run: |
          # Twine will now push a unique version every week
          python -m twine upload --repository-url $TWINE_REPOSITORY_URL dist/*

      - name: Sync Data Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Only commit if data.json exists and has changes
          if [ -f data.json ]; then
            git add data.json pyproject.toml
            git commit -m "Weekly automated build v1.0.${{ github.run_number }}" || echo "No changes to commit"
            git push
          fi
